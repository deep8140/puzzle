<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./tictactoe.css">
  </head>
  <body>
    <div id="app">
      <header class="game-header">
        <a href="index.html" class="back-btn">&larr; Back to Hub</a>
        <h1 style="margin-top: 1rem;">❌ Tic-Tac-Toe ⭕</h1>
        <p>Classic game of X's and O's</p>
      </header>
      
      <div class="glass-panel board-container">
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button id="restart-btn" class="generic-btn">Restart Game</button>
      </div>
    </div>
    <script type="module" src="./tictactoe.js"></script>
  </body>
</html>
